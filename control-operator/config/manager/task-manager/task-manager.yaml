apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: task-manager
  namespace: system
  labels:
    control-plane: task-manager
    app.kubernetes.io/name: deployment
    app.kubernetes.io/instance: task-manager
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: operator
    app.kubernetes.io/part-of: operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: task-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: task-manager
    spec:
      hostNetwork: true
      imagePullSecrets:
        - name: gitlab-registry-secret
      securityContext:
        runAsNonRoot: true
      containers:
        - command:
            - /manager
          args:
            - --health-probe-bind-address=:9082
            - --metrics-bind-address=:9083
            - --zap-encoder=json
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          image: task-manager:latest
          name: manager
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9082
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9082
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
