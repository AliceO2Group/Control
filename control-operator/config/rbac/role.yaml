---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - aliecs.alice.cern
  resources:
  - environments
  - tasks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - aliecs.alice.cern
  resources:
  - environments/finalizers
  - tasks/finalizers
  verbs:
  - update
- apiGroups:
  - aliecs.alice.cern
  resources:
  - environments/status
  - tasks/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - aliecs.alice.cern
  resources:
  - tasktemplates
  verbs:
  - get
  - list
  - watch
