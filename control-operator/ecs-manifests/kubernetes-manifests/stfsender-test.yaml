apiVersion: aliecs.alice.cern/v1alpha1
kind: Task
metadata:
  name: stfsender
spec:
  pod:
    hostNetwork: true
    hostIPC: true
    securityContext:
      fsGroup: 1100
      supplementalGroups: [10, 1105]
    containers:
      - name: readout
        image: gitlab-registry.cern.ch/aliceo2group/dockerfiles/alma9-flp-node/dd:1
        command: ["/bin/bash"]
        args:
          - "-c"
          - "numactl --cpunodebind=0 --preferred=0 -- /opt/o2/bin/StfSender --session=default --shm-segment-id=2 --shm-segment-size=33554432 --dd-region-size=4096 --dd-region-id=3536 --transport=shmem --input-channel-name=buildertosender --severity=info --severity-infologger=info --monitoring-backend='influxdb-unix:///tmp/telegraf.sock' --monitoring-process-interval='5' --discovery-partition=31RUSxZ7k1x --discovery-id=stfs-mtichak-ost-31RUSxf3h9L --discovery-endpoint=no-op:// --discovery-net-if=ib0 --stand-alone --shm-monitor=false         --id 31RUSy3JBLN -S $CONTROL_OCCPLUGIN_ROOT/lib/ -P OCClite --color false --control-port 31002"
        securityContext:
          privileged: true
          runAsUser: 1100
          runAsGroup: 1100
        env:
          - name: O2_DETECTOR
            value: "TST"
          - name: O2_PARTITION
            value: "xxxxxxxx"
          - name: OCC_CONTROL_PORT
            value: "31002"
          - name: O2_SYSTEM
            value: "flp"
          - name: O2_ROLE
            value: "mtichak"
        volumeMounts:
          - name: group
            mountPath: /etc/group
            readOnly: true
          - name: passwd
            mountPath: /etc/passwd
            readOnly: true
          - name: tmp
            mountPath: /tmp
          - name: modules
            mountPath: /lib/modules
        imagePullPolicy: IfNotPresent
    volumes:
      - name: group
        hostPath:
          path: /etc/group
      - name: passwd
        hostPath:
          path: /etc/passwd
      - name: tmp
        hostPath:
          path: /tmp
      - name: modules
        hostPath:
          path: /lib/modules
    imagePullSecrets:
      - name: gitlab-registry-secret
  control:
    mode: "fairmq"
    port: 31002
  bind:
    - name: readout
      type: push
      rateLogging: "0"
      addressing: ipc
      transport: shmem
      global: ""
      target: ""
  connect:
  properties:
    var1: value1
    var2: value2
  state: standby
