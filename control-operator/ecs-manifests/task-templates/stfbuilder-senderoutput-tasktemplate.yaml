apiVersion: aliecs.alice.cern/v1alpha1
kind: TaskTemplate
metadata:
  name: stfbuilder-senderoutput
  namespace: alice-tasks
spec:
  envVars:
    - O2_DETECTOR
    - O2_PARTITION
    - OCC_CONTROL_PORT
    - O2_SYSTEM
    - O2_ROLE
    - O2_INFOLOGGER_MODE
    - DATADIST_FEE_MASK
  pod:
    hostNetwork: true
    hostIPC: true
    securityContext:
    containers:
      - name: stfbuilder
        image: gitlab-registry.cern.ch/aliceo2group/dockerfiles/alma9-flp-node/dd:1
        command: [/opt/o2/bin/StfBuilder]
        securityContext:
          privileged: true
        volumeMounts:
          - name: host-shm
            mountPath: /dev/shm
          - name: group
            mountPath: /etc/group
            readOnly: true
          - name: passwd
            mountPath: /etc/passwd
            readOnly: true
          - name: tmp
            mountPath: /tmp
          - name: modules
            mountPath: /lib/modules
        imagePullPolicy: IfNotPresent
    volumes:
      - name: host-shm
        hostPath:
          path: /dev/shm
          type: Directory
      - name: group
        hostPath:
          path: /etc/group
      - name: passwd
        hostPath:
          path: /etc/passwd
      - name: tmp
        hostPath:
          path: /tmp
      - name: modules
        hostPath:
          path: /lib/modules
    imagePullSecrets:
      - name: gitlab-registry-secret
  control:
    mode: "fairmq"
    # port: ${OCC_CONTROL_PORT} #to be filled in
  bind:
    - name: buildertosender
      type: push
      rateLogging: "0"
      addressing: ipc
      transport: shmem
      sndBufSize: 4
      global: ""
      target: ""
  connect: []
  properties: {}
