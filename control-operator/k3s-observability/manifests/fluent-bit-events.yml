apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-events-config
  namespace: kube-system
data:
  fluent-bit.yml: |
    service:
      flush: 5
      log_level: info

    pipeline:
      inputs:
        - name: kubernetes_events
          tag: kube.events
          kube_url: https://kubernetes.default.svc:443
          kube_ca_file: /var/lib/rancher/k3s/server/tls/server-ca.crt
          kube_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

      outputs:
        - name: forward
          match: kube.events
          host: ${OPENSEARCH_HOST}
          port: ${OPENSEARCH_PORT}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluent-bit-events
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluent-bit-events
  template:
    metadata:
      labels:
        app: fluent-bit-events
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: fluent-bit-events
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:5.0
          args:
            - -c
            - /etc/fluent-bit/fluent-bit.yml
          envFrom:
            - configMapRef:
                name: opensearch-config
          volumeMounts:
            - name: config
              mountPath: /etc/fluent-bit/fluent-bit.yml
              subPath: fluent-bit.yml
            - name: k3s-tls
              mountPath: /var/lib/rancher/k3s/server/tls
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: fluent-bit-events-config
        - name: k3s-tls
          hostPath:
            path: /var/lib/rancher/k3s/server/tls
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit-events
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-events
rules:
- apiGroups: [""]
  resources: [events]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-events
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-events
subjects:
- kind: ServiceAccount
  name: fluent-bit-events
  namespace: kube-system
