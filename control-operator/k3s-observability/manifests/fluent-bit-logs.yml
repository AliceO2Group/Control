apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-logs-config
  namespace: kube-system
data:
  fluent-bit-logs.yml: |
    service:
      flush: 5
      log_level: info

    pipeline:
      inputs:
        - name: tail
          path: /var/log/containers/*.log
          multiline.parser: cri
          tag: kube.*
          mem_buf_limit: 50MB
          skip_long_lines: on


      filters:
        - name: kubernetes
          match: kube.*
          kube_url: https://kubernetes.default.svc:443
          kube_ca_file: /var/lib/rancher/k3s/server/tls/server-ca.crt
          kube_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          labels: on
          annotations: off
          merge_log: on

        - name: nest
          match: kube.*
          operation: lift
          nested_under: kubernetes
          add_prefix: kubernetes.

        - name: modify
          match: kube.*
          rename: msg log

      outputs:
        - name: forward
          match: kube.*
          host: ${OPENSEARCH_HOST}
          port: ${OPENSEARCH_PORT}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-logs
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: fluent-bit-logs
  template:
    metadata:
      labels:
        app: fluent-bit-logs
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      serviceAccountName: fluent-bit-logs
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:5.0
          args:
            - -c
            - /etc/fluent-bit-logs/fluent-bit-logs.yml
          envFrom:
            - configMapRef:
                name: opensearch-config
          volumeMounts:
            - name: config
              mountPath: /etc/fluent-bit-logs/fluent-bit-logs.yml
              subPath: fluent-bit-logs.yml
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: k3s-tls
              mountPath: /var/lib/rancher/k3s/server/tls
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: fluent-bit-logs-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: k3s-tls
          hostPath:
            path: /var/lib/rancher/k3s/server/tls
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit-logs
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-logs
rules:
- apiGroups: [""]
  resources: [pods, namespaces]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-logs
subjects:
- kind: ServiceAccount
  name: fluent-bit-logs
  namespace: kube-system
